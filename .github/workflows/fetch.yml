name: Fetch & Encrypt Market Data — NSE Live (No API Key)

# Runs every 5 minutes during market hours: 9:30–3:30 IST = 4:00–10:00 UTC
# No authentication required — NSE public endpoints only
# Only 1 GitHub Secret needed: SITE_PASSWORD

on:
  schedule:
    # Every 5 min, 4:00 AM – 9:55 AM UTC (= 9:30 AM – 3:25 PM IST), Mon–Fri
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 4-9 * * 1-5'
    # Final run at 10:00 UTC (= 3:30 PM IST)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:   # Manual trigger anytime from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4   # Kill if hung — protects minutes budget

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch NSE data & compute signals
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python scripts/fetch_signals.py

      - name: Commit encrypted signals file
        run: |
          git config user.name  "OIPulse Bot"
          git config user.email "bot@oipulse.local"
          git add data/signals.enc.json
          # Only commit if file actually changed
          git diff --staged --quiet || git commit -m "data: $(date -u '+%H:%M UTC')"
          git push
